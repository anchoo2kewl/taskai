# CI deployments: pull pre-built multi-arch images from GHCR instead of building locally.
# Usage:
#   IMAGE_TAG=abc1234 docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   IMAGE_TAG=abc1234 docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d --no-build
services:
  api:
    image: ghcr.io/anchoo2kewl/taskai-api:${IMAGE_TAG:-latest}

  web:
    image: ghcr.io/anchoo2kewl/taskai-web:${IMAGE_TAG:-latest}

  mcp:
    image: ghcr.io/anchoo2kewl/taskai-mcp:${IMAGE_TAG:-latest}

  yjs-processor:
    image: ghcr.io/anchoo2kewl/taskai-yjs:${IMAGE_TAG:-latest}
