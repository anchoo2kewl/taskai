name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/anchoo2kewl

permissions:
  contents: read
  packages: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.GIT_COMMIT }}
      version: ${{ steps.version.outputs.VERSION }}
      build_time: ${{ steps.version.outputs.BUILD_TIME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version information
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "dev")
          GIT_COMMIT=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "🏷️  Version: $VERSION | Commit: $GIT_COMMIT"

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskai-api:${{ steps.version.outputs.GIT_COMMIT }}
            ${{ env.IMAGE_PREFIX }}/taskai-api:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          cache-from: type=gha,scope=taskai-api
          cache-to: type=gha,mode=max,scope=taskai-api

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskai-web:${{ steps.version.outputs.GIT_COMMIT }}
            ${{ env.IMAGE_PREFIX }}/taskai-web:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          cache-from: type=gha,scope=taskai-web
          cache-to: type=gha,mode=max,scope=taskai-web

      - name: Build and push MCP
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskai-mcp:${{ steps.version.outputs.GIT_COMMIT }}
            ${{ env.IMAGE_PREFIX }}/taskai-mcp:latest
          cache-from: type=gha,scope=taskai-mcp
          cache-to: type=gha,mode=max,scope=taskai-mcp

      - name: Build and push YJS Processor
        uses: docker/build-push-action@v5
        with:
          context: ./api/internal/yjs-processor
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskai-yjs:${{ steps.version.outputs.GIT_COMMIT }}
            ${{ env.IMAGE_PREFIX }}/taskai-yjs:latest
          cache-from: type=gha,scope=taskai-yjs
          cache-to: type=gha,mode=max,scope=taskai-yjs

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy to Staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
          GIT_COMMIT: ${{ needs.build-and-push.outputs.image_tag }}
          BUILD_TIME: ${{ needs.build-and-push.outputs.build_time }}
          COMMIT_SHA: ${{ github.sha }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.STAGING_GITHUB_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.STAGING_GITHUB_CLIENT_SECRET }}
          LOGIN_GH_CLIENT_ID: ${{ secrets.STAGING_LOGIN_GITHUB_CLIENT_ID }}
          LOGIN_GH_CLIENT_SECRET: ${{ secrets.STAGING_LOGIN_GITHUB_CLIENT_SECRET }}
          OAUTH_STATE_SECRET: ${{ secrets.STAGING_OAUTH_STATE_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}
          APP_URL: https://staging.taskai.cc
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 129.213.82.37 >> ~/.ssh/known_hosts

          echo "🚀 Deploying TaskAI to Staging (image: $IMAGE_TAG)..."

          ssh -i ~/.ssh/deploy_key ubuntu@129.213.82.37 << ENDSSH
            set -e
            cd /home/ubuntu/taskai-staging/source
            git fetch origin
            git reset --hard $COMMIT_SHA
            cd ..

            export VERSION='$VERSION'
            export GIT_COMMIT='$GIT_COMMIT'
            export BUILD_TIME='$BUILD_TIME'
            export APP_URL='$APP_URL'
            GH_ID='$GH_OAUTH_CLIENT_ID'
            GH_SECRET='$GH_OAUTH_CLIENT_SECRET'
            if [ -n "\$GH_ID" ] && [ "\$GH_ID" != "-" ]; then
              export GITHUB_CLIENT_ID="\$GH_ID"
              export GITHUB_CLIENT_SECRET="\$GH_SECRET"
            fi
            LOGIN_GH_ID='$LOGIN_GH_CLIENT_ID'
            LOGIN_GH_SECRET='$LOGIN_GH_CLIENT_SECRET'
            if [ -n "\$LOGIN_GH_ID" ] && [ "\$LOGIN_GH_ID" != "-" ]; then
              export LOGIN_GITHUB_CLIENT_ID="\$LOGIN_GH_ID"
              export LOGIN_GITHUB_CLIENT_SECRET="\$LOGIN_GH_SECRET"
            fi
            OAUTH_STATE='$OAUTH_STATE_SECRET'
            if [ -n "\$OAUTH_STATE" ]; then
              export OAUTH_STATE_SECRET="\$OAUTH_STATE"
            fi
            GOOGLE_ID='$GOOGLE_CLIENT_ID'
            if [ -n "\$GOOGLE_ID" ]; then
              export GOOGLE_CLIENT_ID="\$GOOGLE_ID"
              export GOOGLE_CLIENT_SECRET='$GOOGLE_CLIENT_SECRET'
            fi

            # Login to GHCR (no rate limits)
            echo '$GHCR_TOKEN' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            # Ensure nginx /draw/ route
            chmod +x source/deployment/scripts/ensure-draw-route.sh
            sudo source/deployment/scripts/ensure-draw-route.sh staging.taskai.cc

            docker compose down || true
            docker image prune -f || true

            # Pull pre-built GHCR images (no build needed)
            export IMAGE_TAG='$IMAGE_TAG'
            docker compose -f docker-compose.yml -f source/docker-compose.ghcr.yml pull

            # Start containers from pulled images
            docker compose -f docker-compose.yml -f source/docker-compose.ghcr.yml up -d --no-build --force-recreate --remove-orphans
            sleep 15
            docker compose -f docker-compose.yml -f source/docker-compose.ghcr.yml ps
          ENDSSH

      - name: Verify deployment
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          sleep 10
          echo "Checking API health..."
          curl -f -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" https://staging.taskai.cc/api/health || exit 1

          echo "Checking go-draw canvas.js is up to date..."
          CANVAS_JS=$(curl -sL -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" -H "Cache-Control: no-cache" "https://staging.taskai.cc/draw/static/canvas.js?v=$(date +%s)")
          if echo "$CANVAS_JS" | grep -q 'isRotating'; then
            echo "✅ canvas.js contains rotation support"
          else
            echo "❌ canvas.js does NOT contain rotation support — stale content!"
            exit 1
          fi
          echo "✅ Staging deployed successfully"

      - name: Deployment summary
        run: |
          echo "## 🚀 Staging Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 129.213.82.37" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ needs.build-and-push.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://staging.taskai.cc" >> $GITHUB_STEP_SUMMARY
