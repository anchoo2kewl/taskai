name: Deploy to Production

on:
  push:
    branches: [ production ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or commit SHA)'
        required: true
        default: 'main'

env:
  IMAGE_PREFIX: ghcr.io/anchoo2kewl

permissions:
  contents: read
  packages: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.GIT_COMMIT }}
      version: ${{ steps.version.outputs.VERSION }}
      build_time: ${{ steps.version.outputs.BUILD_TIME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set version information
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "dev")
          GIT_COMMIT=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "🏷️  Version: $VERSION | Commit: $GIT_COMMIT"

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskai-api:${{ steps.version.outputs.GIT_COMMIT }}
            ${{ env.IMAGE_PREFIX }}/taskai-api:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          cache-from: type=gha,scope=taskai-api
          cache-to: type=gha,mode=max,scope=taskai-api

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskai-web:${{ steps.version.outputs.GIT_COMMIT }}
            ${{ env.IMAGE_PREFIX }}/taskai-web:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          cache-from: type=gha,scope=taskai-web
          cache-to: type=gha,mode=max,scope=taskai-web

      - name: Build and push MCP
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskai-mcp:${{ steps.version.outputs.GIT_COMMIT }}
            ${{ env.IMAGE_PREFIX }}/taskai-mcp:latest
          cache-from: type=gha,scope=taskai-mcp
          cache-to: type=gha,mode=max,scope=taskai-mcp

      - name: Build and push YJS Processor
        uses: docker/build-push-action@v5
        with:
          context: ./api/internal/yjs-processor
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskai-yjs:${{ steps.version.outputs.GIT_COMMIT }}
            ${{ env.IMAGE_PREFIX }}/taskai-yjs:latest
          cache-from: type=gha,scope=taskai-yjs
          cache-to: type=gha,mode=max,scope=taskai-yjs

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to Production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
          GIT_COMMIT: ${{ needs.build-and-push.outputs.image_tag }}
          BUILD_TIME: ${{ needs.build-and-push.outputs.build_time }}
          COMMIT_SHA: ${{ github.sha }}
          DB_DRIVER: postgres
          DB_DSN: ${{ secrets.PRODUCTION_DB_DSN }}
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.PRODUCTION_GITHUB_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.PRODUCTION_GITHUB_CLIENT_SECRET }}
          LOGIN_GH_CLIENT_ID: ${{ secrets.PRODUCTION_LOGIN_GITHUB_CLIENT_ID }}
          LOGIN_GH_CLIENT_SECRET: ${{ secrets.PRODUCTION_LOGIN_GITHUB_CLIENT_SECRET }}
          OAUTH_STATE_SECRET: ${{ secrets.PRODUCTION_OAUTH_STATE_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.PRODUCTION_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.PRODUCTION_GOOGLE_CLIENT_SECRET }}
          APP_URL: https://taskai.cc
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan 31.97.102.48 >> ~/.ssh/known_hosts

          echo "🚀 Deploying TaskAI to Production (image: $IMAGE_TAG)..."

          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 bash -s << ENDSSH
            set -ex
            cd /home/ubuntu/taskai/source
            git fetch origin
            git reset --hard "$COMMIT_SHA"
            cd ..

            export VERSION="$VERSION"
            export GIT_COMMIT="$GIT_COMMIT"
            export BUILD_TIME="$BUILD_TIME"
            export DB_DRIVER="$DB_DRIVER"
            export DB_DSN="$DB_DSN"
            export JWT_SECRET="$JWT_SECRET"
            export APP_URL="$APP_URL"
            export OAUTH_SUCCESS_URL="https://taskai.cc/oauth/callback"
            export OAUTH_ERROR_URL="https://taskai.cc/login"
            export ENV=production

            if [ -n "$GH_OAUTH_CLIENT_ID" ] && [ "$GH_OAUTH_CLIENT_ID" != "-" ]; then
              export GITHUB_CLIENT_ID="$GH_OAUTH_CLIENT_ID"
              export GITHUB_CLIENT_SECRET="$GH_OAUTH_CLIENT_SECRET"
            fi
            export LOGIN_GITHUB_CLIENT_ID="$LOGIN_GH_CLIENT_ID"
            export LOGIN_GITHUB_CLIENT_SECRET="$LOGIN_GH_CLIENT_SECRET"
            export OAUTH_STATE_SECRET="$OAUTH_STATE_SECRET"
            export GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            export GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"

            # Login to GHCR (no rate limits, uses GITHUB_TOKEN)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            chmod +x source/deployment/scripts/ensure-draw-route.sh
            sudo source/deployment/scripts/ensure-draw-route.sh taskai.cc

            docker compose down || true
            docker image prune -f || true

            export IMAGE_TAG="$IMAGE_TAG"
            docker compose -f docker-compose.yml -f source/docker-compose.ghcr.yml pull
            docker compose -f docker-compose.yml -f source/docker-compose.ghcr.yml up -d --no-build --force-recreate --remove-orphans
            sleep 15
            docker compose -f docker-compose.yml -f source/docker-compose.ghcr.yml ps
          ENDSSH

      - name: Capture container logs on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@31.97.102.48 bash -s << 'ENDSSH'
            cd /home/ubuntu/taskai
            docker compose ps -a
            docker compose logs --tail=100 api
          ENDSSH

      - name: Verify deployment
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          sleep 10
          curl -f -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" https://taskai.cc/api/health || exit 1

          CANVAS_JS=$(curl -sL -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" -H "Cache-Control: no-cache" "https://taskai.cc/draw/static/canvas.js?v=$(date +%s)")
          if echo "$CANVAS_JS" | grep -q 'isRotating'; then
            echo "✅ canvas.js contains rotation support"
          else
            echo "❌ canvas.js does NOT contain rotation support — stale content!"
            exit 1
          fi
          echo "✅ Production deployed successfully"

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** 31.97.102.48" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ needs.build-and-push.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://taskai.cc" >> $GITHUB_STEP_SUMMARY
